models:
  - name: dim_jma_station
    config:
      contract:
        enforced: true
    description: >
      JMA weather observation station dimension, one row per station,
      including discontinued stations (type-1 snapshot of the JMA obsdl
      station master; see docs/JMA-Weather-Data-Retrieval.md §4). Built from
      the jma_stations seed, which is regenerated by
      scripts/update_jma_stations_seed.py. Coordinates are decimal degrees
      converted from JMA's degrees + decimal minutes (0.1′ ≈ 185 m
      precision); the Antarctic station 昭和 has a negative latitude.
      Historical relocations are not tracked here — the hourly facts carry
      homogeneity numbers instead.
    columns:
      - name: station_id
        data_type: string
        description: >
          JMA obsdl station id and natural key, e.g. s47662 = 東京. The
          s/a prefix encodes the station type.
        data_tests:
          - unique
          - not_null
      - name: station_type
        data_type: string
        description: >
          staffed (気象官署, s-prefixed — observes all 15 hourly elements)
          or amedas (a-prefixed — observes a subset; see the obs_* columns).
        data_tests:
          - accepted_values:
              arguments:
                values: [staffed, amedas]
      - name: prefecture_code
        data_type: int
        description: >
          JMA area code (pd), e.g. 44 = 東京. Hokkaidō is subdivided into 14
          areas, 99 is Antarctica; see docs/JMA-Weather-Data-Retrieval.md
          Appendix A.
        data_tests:
          - not_null
      - name: station_name
        data_type: string
        description: Station name in Japanese (e.g. 東京, 府中).
        data_tests:
          - not_null
      - name: station_kana
        data_type: string
        description: Station name in katakana.
      - name: latitude
        data_type: double
        description: Latitude in decimal degrees (negative = south).
        data_tests:
          - not_null
          - dbt_utils.accepted_range:
              arguments:
                min_value: -90
                max_value: 90
      - name: longitude
        data_type: double
        description: Longitude in decimal degrees (negative = west).
        data_tests:
          - not_null
          - dbt_utils.accepted_range:
              arguments:
                min_value: 0
                max_value: 180
      - name: elevation_m
        data_type: double
        description: Station elevation in meters (can be below sea level).
      - name: kansoku
        data_type: string
        description: >
          Raw 6-digit observed-element mask from the obsdl site, digit order
          [precipitation, wind, temperature, sunshine, snow, other];
          0 = not observed, 1 = observed, 2 = estimated. Decoded into the
          obs_* columns.
      - name: obs_precipitation
        data_type: int
        description: Observes precipitation (0/1).
      - name: obs_wind
        data_type: int
        description: Observes wind (0/1).
      - name: obs_temperature
        data_type: int
        description: Observes temperature (0/1).
      - name: obs_sunshine
        data_type: int
        description: >
          Observes sunshine (0/1/2; 2 = satellite-derived estimate, the norm
          at active AMeDAS stations since 2021-03).
      - name: obs_snow
        data_type: int
        description: Observes snow depth/snowfall (0/1).
      - name: obs_other
        data_type: int
        description: >
          Observes the "other" element group (0/1): staffed-station extras
          (pressure, solar radiation, weather, cloud, visibility) or
          humidity at modernized AMeDAS stations.
      - name: observation_ended_on
        data_type: date
        description: >
          Date observations ended, for discontinued stations; null while the
          station is active.
      - name: is_active
        data_type: boolean
        description: True when observation_ended_on is null.
        data_tests:
          - not_null
