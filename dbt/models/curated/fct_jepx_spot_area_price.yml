models:
  - name: fct_jepx_spot_area_price
    config:
      contract:
        enforced: true
    description: >
      JEPX day-ahead spot clearing prices by bidding zone. Grain: one row per
      delivery period (trade date x 30-minute time code) per area — 9 rows
      per period, unpivoted from std_jepx__spot. area_price_jpy_kwh is
      NON-ADDITIVE: average (volume-weight if needed), never sum.
      trade_datetime is a standalone timestamp for time-series work, not a
      dimension key.
    data_tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - date_key
              - time_code
              - area_key
    columns:
      - name: date_key
        data_type: date
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_date')
                field: date_key
      - name: time_code
        data_type: int
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_delivery_period')
                field: time_code
      - name: area_key
        data_type: int
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_area')
                field: area_key
      - name: trade_datetime
        data_type: timestamp
        data_tests:
          - not_null
      - name: area_price_jpy_kwh
        data_type: double
        data_tests:
          - not_null
          - dbt_utils.accepted_range:
              arguments:
                min_value: 0
