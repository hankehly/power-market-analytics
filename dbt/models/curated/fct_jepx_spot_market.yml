models:
  - name: fct_jepx_spot_market
    config:
      contract:
        enforced: true
    description: >
      Market-wide JEPX day-ahead spot auction results. Grain: one row per
      delivery period (trade date x 30-minute time code). Volumes are fully
      additive; system_price_jpy_kwh is NON-ADDITIVE (average, never sum).
      Block volumes are null for fiscal years before JEPX added them to the
      source files (~FY2022). trade_datetime is a standalone timestamp, not
      a dimension key.
    data_tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - date_key
              - time_code
      - dbt_utils.expression_is_true:
          name: fct_jepx_spot_market_contract_lte_bid_volumes
          arguments:
            expression: "contract_volume_kwh <= sell_bid_volume_kwh and contract_volume_kwh <= buy_bid_volume_kwh"
      - dbt_utils.expression_is_true:
          name: fct_jepx_spot_market_sell_block_contract_lte_bid
          arguments:
            expression: "sell_block_contract_volume_kwh <= sell_block_bid_volume_kwh"
      - dbt_utils.expression_is_true:
          name: fct_jepx_spot_market_buy_block_contract_lte_bid
          arguments:
            expression: "buy_block_contract_volume_kwh <= buy_block_bid_volume_kwh"
    columns:
      - name: date_key
        data_type: date
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_date')
                field: date_key
      - name: time_code
        data_type: int
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_delivery_period')
                field: time_code
      - name: trade_datetime
        data_type: timestamp
        data_tests:
          - unique
          - not_null
      - name: sell_bid_volume_kwh
        data_type: bigint
        data_tests:
          - not_null
          - dbt_utils.accepted_range:
              arguments:
                min_value: 0
      - name: buy_bid_volume_kwh
        data_type: bigint
        data_tests:
          - not_null
          - dbt_utils.accepted_range:
              arguments:
                min_value: 0
      - name: contract_volume_kwh
        data_type: bigint
        data_tests:
          - not_null
          - dbt_utils.accepted_range:
              arguments:
                min_value: 0
      - name: sell_block_bid_volume_kwh
        data_type: bigint
        data_tests:
          - dbt_utils.accepted_range:
              arguments:
                min_value: 0
      - name: sell_block_contract_volume_kwh
        data_type: bigint
        data_tests:
          - dbt_utils.accepted_range:
              arguments:
                min_value: 0
      - name: buy_block_bid_volume_kwh
        data_type: bigint
        data_tests:
          - dbt_utils.accepted_range:
              arguments:
                min_value: 0
      - name: buy_block_contract_volume_kwh
        data_type: bigint
        data_tests:
          - dbt_utils.accepted_range:
              arguments:
                min_value: 0
      - name: system_price_jpy_kwh
        data_type: double
        data_tests:
          - not_null
          - dbt_utils.accepted_range:
              arguments:
                min_value: 0
