models:
  - name: stg_jepx__spot
    config:
      contract:
        enforced: true
    description: >
      As-is representation of raw.jepx_spot (JEPX day-ahead spot market
      results). One row per trade_date and 30-minute time_code. Column
      documentation lives on the source (models/raw/jepx.yml).
    data_tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - trade_date
              - time_code
    columns:
      - name: trade_date
        data_type: date
        data_tests:
          - not_null
      - name: time_code
        data_type: int
        data_tests:
          - not_null
      - name: sell_bid_volume_kwh
        data_type: bigint
      - name: buy_bid_volume_kwh
        data_type: bigint
      - name: contract_volume_kwh
        data_type: bigint
      - name: system_price_jpy_kwh
        data_type: double
      - name: area_price_hokkaido_jpy_kwh
        data_type: double
      - name: area_price_tohoku_jpy_kwh
        data_type: double
      - name: area_price_tokyo_jpy_kwh
        data_type: double
      - name: area_price_chubu_jpy_kwh
        data_type: double
      - name: area_price_hokuriku_jpy_kwh
        data_type: double
      - name: area_price_kansai_jpy_kwh
        data_type: double
      - name: area_price_chugoku_jpy_kwh
        data_type: double
      - name: area_price_shikoku_jpy_kwh
