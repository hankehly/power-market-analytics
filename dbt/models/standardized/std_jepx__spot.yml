models:
  - name: std_jepx__spot
    config:
      contract:
        enforced: true
    description: >
      Standardized JEPX day-ahead spot market results: all fields from
      stg_jepx__spot plus trade_datetime, the delivery period start
      (trade_date + (time_code - 1) * 30 minutes, naive JST; time code 1 =
      00:00-00:30, 48 = 23:30-24:00), and fiscal_year (Japanese fiscal year,
      April through March). One row per trade_datetime. All price columns are
      non-negative. Note the JEPX 0.01 JPY/kWh minimum-bid floor does not
      hold in the earliest fiscal years: FY2016 contains genuine 0.00 area
      prices, so tests only assert >= 0.
    data_tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - trade_date
              - time_code
    columns:
      - name: trade_date
        data_type: date
        data_tests:
          - not_null
      - name: time_code
        data_type: int
        data_tests:
          - not_null
          - dbt_utils.accepted_range:
              arguments:
                min_value: 1
                max_value: 48
      - name: trade_datetime
        data_type: timestamp
        data_tests:
          - unique
          - not_null
      - name: fiscal_year
        data_type: int
        data_tests:
          - not_null
      - name: sell_bid_volume_kwh
        data_type: bigint
        data_tests:
          - dbt_utils.accepted_range:
              arguments:
                min_value: 0
      - name: buy_bid_volume_kwh
        data_type: bigint
        data_tests:
          - dbt_utils.accepted_range:
              arguments:
                min_value: 0
      - name: contract_volume_kwh
        data_type: bigint
        data_tests:
          - dbt_utils.accepted_range:
              arguments:
                min_value: 0
      - name: system_price_jpy_kwh
        data_type: double
        data_tests:
