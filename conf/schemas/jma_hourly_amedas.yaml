description: >
  JMA hourly observations from AMeDAS stations (a-prefixed station ids), core
  element set 降水量+気温+風向・風速+日照時間 (element codes 101-201-301-401):
  the 15-column AMeDAS layout described in docs/JMA-Weather-Data-Retrieval.md
  §7. Files are downloaded by scripts/download_jma_hourly.py and read
  positionally (source _c0.._c14) by JmaHourlyCsvLoader because the JMA header
  rows repeat labels per element; station_id is injected from the file name.
  One row per station and hour; hours run 01:00-24:00 JST with 24:00 stored as
  00:00 of the next day, so a calendar-year file spans Jan 1 01:00 .. next
  Jan 1 00:00 with no overlap between years. Quality flags: 8 normal,
  5 quasi-normal, 4 insufficient, 2 questionable, 1 missing, 0 not observed.
  Value cells are empty when the flag is 2/1/0 — and AMeDAS sunshine also
  stores an empty cell (not 0) with flag 8 for no-sunshine hours, so values
  must be interpreted together with their flag. At a few stations the
  wind-direction quality flag cell itself is empty (null) instead of 0 while
  the wind element is unobserved (wind_speed_quality_flag 0): a1674 through
  2022-10-30, a1643/a1644 in Dec 2016 — hence that flag is nullable. Wind
  direction is a 16-point compass word (北西 etc.) or 静穏 (calm). Homogeneity numbers restart at 1 in
  every downloaded file; only within-file changes mark observation-environment
  breaks.

read_options:
  # Java charset name for cp932 / Shift_JIS with Windows extensions
  encoding: windows-31j

grain: [station_id, observed_at]

columns:
  - { name: station_id, source: __station_id, type: string, nullable: false }
  - { name: observed_at, source: _c0, type: timestamp, format: yyyy/M/d H:mm:ss, nullable: false }
  - { name: precipitation_mm, source: _c1, type: double }
  - { name: precipitation_quality_flag, source: _c2, type: int, nullable: false }
  - { name: precipitation_homogeneity_no, source: _c3, type: int, nullable: false }
  - { name: temperature_c, source: _c4, type: double }
  - { name: temperature_quality_flag, source: _c5, type: int, nullable: false }
  - { name: temperature_homogeneity_no, source: _c6, type: int, nullable: false }
  - { name: wind_speed_ms, source: _c7, type: double }
  - { name: wind_speed_quality_flag, source: _c8, type: int, nullable: false }
  - { name: wind_direction, source: _c9, type: string }
  - { name: wind_direction_quality_flag, source: _c10, type: int }
  - { name: wind_homogeneity_no, source: _c11, type: int, nullable: false }
  - { name: sunshine_duration_h, source: _c12, type: double }
  - { name: sunshine_quality_flag, source: _c13, type: int, nullable: false }
  - { name: sunshine_homogeneity_no, source: _c14, type: int, nullable: false }
