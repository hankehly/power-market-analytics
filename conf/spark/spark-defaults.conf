# Shared Spark settings applied to both the thriftserver JVM and the
# devcontainer Python session (SPARK_CONF_DIR=/workspace/conf/spark).
# Per-JVM settings (spark.master, spark.driver.memory) live in
# docker-compose.yaml for the thriftserver.

spark.serializer org.apache.spark.serializer.KryoSerializer

spark.sql.ansi.enabled true
spark.sql.warehouse.dir /spark-warehouse
spark.sql.adaptive.enabled true

spark.sql.parquet.compression.codec zstd
